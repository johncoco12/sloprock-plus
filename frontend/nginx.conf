server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # host.docker.internal resolves to the Docker host gateway via extra_hosts,
    # so nginx can reach the backend which runs with network_mode: host on :8085.
    set $backend host.docker.internal:8085;

    # Docker's embedded DNS — still needed to resolve $backend at request time.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy static assets from the backend
    location /static/ {
        proxy_pass         http://$backend;
        proxy_set_header   Host              $host;
    }

    # Proxy REST API to the backend
    location /api/ {
        proxy_pass         http://$backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 55m;
    }

    # Proxy audio files
    location /audio/ {
        proxy_pass         http://$backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    # Proxy WebSocket
    location /ws/ {
        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }
}
