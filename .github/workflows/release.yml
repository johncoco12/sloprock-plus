name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.3)'
        required: true
      title:
        description: 'Release title (blank → "SlopRock Plus v{version}")'
        required: false
        default: ''
      description:
        description: 'Release notes / changelog (markdown)'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false
      draft:
        description: 'Create as draft (publish manually afterwards)'
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  # ── 1. Validate version and push git tag ───────────────────────────────────
  validate-and-tag:
    name: Validate & tag
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Parse and validate version
        id: v
        env:
          RAW: ${{ inputs.version }}
        run: |
          version="${RAW#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '$RAW' — expected semver like 1.2.3"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version"    >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.v.outputs.tag }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag "$TAG"
          git push origin "$TAG"

  # ── 2a. Build backend image ────────────────────────────────────────────────
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: validate-and-tag

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-and-tag.outputs.tag }}
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=semver,pattern={{version}},value=${{ needs.validate-and-tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.validate-and-tag.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── 2b. Build frontend image ───────────────────────────────────────────────
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: validate-and-tag

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-and-tag.outputs.tag }}
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=semver,pattern={{version}},value=${{ needs.validate-and-tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.validate-and-tag.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── 3. Publish GitHub release ──────────────────────────────────────────────
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [validate-and-tag, build-backend, build-frontend]

    permissions:
      contents: write

    steps:
      - name: Resolve release title
        id: title
        env:
          INPUT_TITLE: ${{ inputs.title }}
          VERSION: ${{ needs.validate-and-tag.outputs.version }}
        run: |
          title="${INPUT_TITLE:-SlopRock Plus v${VERSION}}"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-and-tag.outputs.tag }}
          name: ${{ steps.title.outputs.title }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          body: |
            ${{ inputs.description }}

            ## Docker images

            **Backend**
            ```
            ${{ needs.build-backend.outputs.image }}
            ```

            **Frontend**
            ```
            ${{ needs.build-frontend.outputs.image }}
            ```
